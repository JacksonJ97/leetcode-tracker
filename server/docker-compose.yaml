services:
  postgres:
    image: postgres:18
    container_name: leetcode-tracker
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: leetcode-tracker
    ports:
      - "5454:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
